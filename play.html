<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compare • Divide in Divine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #050a12;
      --bg-gradient-top: #0c1f3d;
      --play-purple-deep: #1a0d28;
      --play-purple-mid: #2a1240;
      --text: #ffffff;
      --gold: #d4af37;
      --maxw: 1120px;
      --font-mono: "Roboto Mono", ui-monospace, "Cascadia Code", monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background:
        radial-gradient(ellipse 100% 55% at 50% 100%, rgba(90, 40, 120, 0.38) 0%, transparent 55%),
        linear-gradient(180deg, #0a1628 0%, #0c1830 32%, #0a0812 70%, #050308 100%);
    }

    html::before,
    html::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-repeat: repeat;
      opacity: 0.9;
    }

    /* Star field layers (reduced density) */
    html::before {
      background-image:
        radial-gradient(1px 1px at 12px 18px, rgba(255, 255, 255, 0.95) 99%, transparent 100%),
        radial-gradient(1px 1px at 168px 106px, rgba(255, 255, 255, 0.72) 99%, transparent 100%),
        radial-gradient(1.5px 1.5px at 312px 44px, rgba(255, 255, 255, 0.62) 99%, transparent 100%);
      background-size: 560px 440px;
      filter: drop-shadow(0 0 2px rgba(170, 210, 255, 0.16));
    }

    html::after {
      background-image:
        radial-gradient(1px 1px at 320px 210px, rgba(255, 255, 255, 0.45) 99%, transparent 100%);
      background-size: 720px 600px;
      opacity: 0.45;
      transform: translateZ(0);
      animation: stars-drift 42s linear infinite;
    }

    /* Soft planets behind UI */
    body::before {
      content: "";
      position: fixed;
      inset: -40px;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(closest-side at 14% 24%, rgba(148, 214, 255, 0.18) 0%, rgba(120, 170, 255, 0.1) 32%, rgba(120, 170, 255, 0.04) 48%, transparent 74%),
        radial-gradient(closest-side at 82% 68%, rgba(255, 170, 230, 0.15) 0%, rgba(230, 120, 210, 0.08) 30%, rgba(230, 120, 210, 0.035) 46%, transparent 72%),
        radial-gradient(closest-side at 86% 16%, rgba(255, 220, 140, 0.1) 0%, rgba(255, 190, 120, 0.055) 28%, rgba(255, 190, 120, 0.025) 44%, transparent 68%);
      filter: blur(1.2px);
      opacity: 0.78;
    }

    @keyframes stars-drift {
      from {
        transform: translate3d(0, 0, 0);
      }
      to {
        transform: translate3d(-120px, 160px, 0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html::after {
        animation: none;
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 15px;
      line-height: 1.65;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      position: relative;
      z-index: 1;
    }

    a {
      color: var(--gold);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .site-header {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 28px 32px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 10;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .logo img {
      width: 22px;
      height: 22px;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-links a {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: inherit;
      font-weight: inherit;
      line-height: 1;
      padding: 10px 14px;
      border-radius: 999px;
    }

    .nav-links a:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
    }

    .play-page {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: clamp(16px, 3vw, 32px) clamp(20px, 3vw, 32px) clamp(48px, 8vw, 96px);
    }

    .play-hero {
      display: grid;
      gap: clamp(20px, 3vw, 40px);
      align-items: center;
      min-height: min(68vh, 640px);
    }

    @media (min-width: 900px) {
      .play-hero {
        grid-template-columns: 1.2fr 0.8fr;
        gap: clamp(12px, 2.5vw, 36px);
      }
    }

    .play-scale-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0 24px;
    }

    .play-scale-hint {
      position: absolute;
      top: -78px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.92);
      text-align: center;
      pointer-events: none;
      text-shadow: 0 10px 24px rgba(0, 0, 0, 0.55);
      white-space: nowrap;
    }

    .play-scale-figure {
      position: relative;
      width: 100%;
      max-width: min(100%, 800px);
    }

    .play-scale-tilt {
      --beam-angle: 0deg;
      position: relative;
      transform: rotate(var(--beam-angle));
      transform-origin: 50% 24%;
      transition: transform 0.75s cubic-bezier(0.33, 1, 0.45, 1);
    }

    .play-scale-figure .play-scale-hero,
    .play-scale-tilt .play-scale-hero {
      width: 100%;
      max-width: none;
      height: auto;
      display: block;
      position: relative;
      z-index: 0;
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 12px 40px rgba(0, 0, 0, 0.45));
    }

    .play-scale__pan {
      position: absolute;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      box-sizing: border-box;
      pointer-events: auto;
      overflow: visible;
    }

    .play-scale__pan--left {
      left: calc(2% - 10px);
      width: 36%;
      top: 38%;
      height: 58%;
    }

    .play-scale__pan--right {
      right: calc(2% - 10px);
      width: 36%;
      top: 38%;
      height: 58%;
    }

    .play-scale__pan.is-dragover {
      border-radius: 10px;
      background: rgba(212, 175, 55, 0.12);
      box-shadow: inset 0 0 0 2px rgba(212, 175, 55, 0.45);
    }

    .play-scale__pan-content {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      width: 100%;
      min-height: max(42%, 140px);
      padding: 0 2px 1%;
      /* Let drags pass through to .play-scale__pan (dragover must run on a single drop parent). */
      pointer-events: none;
      overflow: visible;
    }

    .play-scale__chip {
      /* Square sizing only—no panel so the PNG reads directly on the cloud. */
      --chip-side: min(120px, 32vmin);
      position: relative;
      width: var(--chip-side);
      height: var(--chip-side);
      flex-shrink: 0;
      box-sizing: border-box;
      overflow: visible;
      background: none;
      border: none;
      box-shadow: none;
      pointer-events: none;
    }

    .play-scale__chip img {
      /* Fill chip; intrinsic 120×120 attrs + flex was clipping to ~one quadrant in some browsers. */
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center center;
      pointer-events: none;
    }

    .play-grid-board {
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 12px;
      padding: clamp(8px, 1.2vw, 12px);
      background: rgba(0, 0, 0, 0.25);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      min-width: 0;
    }

    .play-grid-scroll {
      max-height: min(46vh, 360px);
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding-right: 4px;
      margin-right: -2px;
      scrollbar-color: rgba(255, 255, 255, 0.25) rgba(255, 255, 255, 0.06);
      scrollbar-width: thin;
    }

    .play-grid-scroll::-webkit-scrollbar {
      width: 7px;
    }

    .play-grid-scroll::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 4px;
    }

    .play-grid-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.22);
      border-radius: 4px;
    }

    .play-grid-scroll:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    .play-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(5px, 1vw, 9px);
    }

    .play-grid__cell {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(12, 20, 40, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-sizing: border-box;
      min-width: 0;
      cursor: grab;
      touch-action: manipulation;
    }

    .play-grid__cell:active {
      cursor: grabbing;
    }

    .play-grid__cell img {
      /* Out of flex flow: flex children use min-intrinsic size and can’t shrink below
         image pixels—absolute + fixed box + contain fixes cut-off. */
      position: absolute;
      left: 50%;
      top: 50%;
      width: 76%;
      height: 76%;
      transform: translate(-50%, -50%);
      object-fit: contain;
      object-position: center;
      display: block;
      /* Image is the drag source (reliable in Safari/Chrome; cell-only drag often fails). */
      -webkit-user-drag: element;
      user-select: none;
    }

    .play-compare {
      display: grid;
      gap: clamp(20px, 3vw, 32px);
      margin-top: clamp(28px, 5vw, 48px);
      position: relative;
    }

    @media (min-width: 800px) {
      .play-compare {
        grid-template-columns: 1fr auto 1fr;
        align-items: start;
        gap: clamp(16px, 2vw, 24px);
      }
    }

    .play-compare__panel h2 {
      font-family: "Oswald", var(--font-mono);
      font-size: clamp(1.15rem, 2.2vw, 1.35rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.95);
      margin: 0 0 14px;
    }

    .play-compare__panel p {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.86);
    }

    .play-info {
      margin-top: clamp(12px, 2.5vw, 22px);
      max-width: 980px;
    }

    .play-info__title {
      font-family: "Oswald", var(--font-mono);
      font-size: clamp(1.15rem, 2.2vw, 1.35rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.95);
      margin: 0 0 12px;
    }

    .info-feed {
      position: relative;
      padding-left: 22px;
      display: grid;
      gap: 14px;
    }

    .info-feed::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.06),
        rgba(255, 255, 255, 0.22),
        rgba(255, 255, 255, 0.06)
      );
      border-radius: 2px;
      pointer-events: none;
    }

    .info-node {
      position: relative;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(5, 10, 20, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(10px);
    }

    .info-node::before {
      content: "";
      position: absolute;
      left: -22px;
      top: 18px;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.12), 0 0 18px rgba(255, 255, 255, 0.22);
    }

    .info-node__head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 8px;
    }

    .info-node__name {
      margin: 0;
      font-family: "Oswald", var(--font-mono);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.94);
    }

    .info-node__meta {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.62);
      white-space: nowrap;
    }

    .info-node__body {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.86);
    }

    .info-node__sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      line-height: 1.6;
    }

    .info-node__sources-title {
      margin: 0 0 6px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.68);
    }

    .info-node__sources ul {
      margin: 0;
      padding-left: 18px;
    }

    .info-node__sources li {
      margin: 0 0 6px;
    }

    .info-node.is-existing {
      animation: info-pulse 520ms ease-out;
    }

    @keyframes info-pulse {
      0% {
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.24), 0 0 0 0 rgba(255, 255, 255, 0.22);
      }
      100% {
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.24), 0 0 0 10px rgba(255, 255, 255, 0);
      }
    }

    .info-arrows {
      position: fixed;
      left: 50%;
      top: 0;
      width: max-content;
      display: inline-flex;
      flex-direction: column;
      gap: clamp(4px, 0.85vw, 7px);
      opacity: 0;
      transform: translate(-50%, -4px);
      pointer-events: none;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.35));
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .info-arrows span {
      width: 0;
      height: 0;
      border-left: clamp(7px, 1.35vw, 10px) solid transparent;
      border-right: clamp(7px, 1.35vw, 10px) solid transparent;
      border-top: clamp(8px, 1.55vw, 11px) solid rgba(110, 115, 125, 0.45);
      animation: story-chev-pulse 1.25s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      will-change: transform, filter;
    }

    /* Bottom chevron (last in column) flashes first, then upward */
    .info-arrows span:nth-child(1) {
      animation-delay: 0.34s;
    }

    .info-arrows span:nth-child(2) {
      animation-delay: 0.17s;
    }

    .info-arrows span:nth-child(3) {
      animation-delay: 0s;
    }

    .info-arrows.is-active {
      opacity: 0.95;
      transform: translate(-50%, -12px);
    }

    @keyframes story-chev-pulse {
      0%,
      32%,
      100% {
        border-top-color: rgba(95, 100, 110, 0.35);
        filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
        transform: translateY(0) scale(1);
      }

      14% {
        border-top-color: #ffffff;
        filter: drop-shadow(0 0 12px rgba(255, 255, 255, 1))
          drop-shadow(0 0 5px rgba(255, 255, 255, 0.95));
        transform: translateY(5px) scale(1.14);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .info-arrows span {
        animation: none;
        border-top-color: rgba(255, 255, 255, 0.5);
        filter: none;
        transform: none;
      }
    }

    .play-compare__panel--right {
      position: relative;
    }

    @media (min-width: 800px) {
      .play-compare__panel--right::before {
        content: none;
      }
    }

    .play-compare__diamond {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0;
    }

    @media (min-width: 800px) {
      .play-compare__diamond {
        padding-top: 2.2rem;
      }
    }

    .play-compare__diamond span {
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.55);
      transform: rotate(45deg);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.35);
    }

    @media (max-width: 799px) {
      .play-compare__diamond {
        order: -1;
      }
    }

    @media (max-width: 899px) {
      .play-hero {
        min-height: unset;
      }
    }

    @media (max-width: 768px) {
      .site-header {
        padding-left: 20px;
        padding-right: 20px;
      }
    }

    .play-grid-col {
      min-width: 0;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="./index.html#top" aria-label="Home"
      ><img src="assets/svgs/Logo.svg" alt="" width="22" height="22"
    /></a>
    <nav class="nav-links">
      <a href="./index.html#top">← Home</a>
      <a href="./source-list.html">Source List →</a>
      <a class="nav-link--context" href="./context.html">Context →</a>
    </nav>
  </header>

  <main class="play-page" aria-label="Compare deities">
    <div class="play-hero">
      <div class="play-scale-col">
        <div class="play-scale-wrap">
          <div class="play-scale-hint">Drag &amp; Drop To Tip The Scale</div>
          <div
            class="play-scale-figure"
            id="play-scale-root"
            role="group"
            aria-label="Balance scale: drop a deity on the left or right cloud"
          >
            <div class="play-scale-tilt" id="play-scale-tilt">
              <img
                class="play-scale-hero"
                src="assets/svgs/scale/Group%2040.svg"
                alt=""
                width="660"
                height="302"
                decoding="async"
                aria-hidden="true"
              />
              <div
                class="play-scale__pan play-scale__pan--left"
                id="left-pan"
                role="group"
                aria-label="Left cloud, drop a deity here"
              >
                <div class="play-scale__pan-content" id="left-pan-content"></div>
              </div>
              <div
                class="play-scale__pan play-scale__pan--right"
                id="right-pan"
                role="group"
                aria-label="Right cloud, drop a deity here"
              >
                <div class="play-scale__pan-content" id="right-pan-content"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="play-grid-col">
        <div class="play-grid-board">
          <div
            class="play-grid-scroll"
            role="region"
            aria-label="Scrollable gallery of deities"
            tabindex="0"
          >
            <div class="play-grid" aria-label="Deity tiles">

              <img src="assets/pngs/ayyanar-png.png" alt="Ayyanar" width="200" height="200" loading="lazy" draggable="true" />
            </div>
            <div class="play-grid__cell" data-cid="balakrishna" data-weight="273">
              <img src="assets/pngs/Balakrishnan_png.png" alt="Balakrishna" width="200" height="200" loading="lazy" draggable="true" />
            </div>
            <div class="play-grid__cell" data-cid="durga" data-weight="260">
              <img src="assets/pngs/Durga-png.png" alt="Durga" width="200" height="200" loading="lazy" draggable="true" />
            </div>
            <div class="play-grid__cell" data-cid="hanuman" data-weight="152">
              <img src="assets/pngs/Hanuman-png.png" alt="Hanuman" width="200" height="200" loading="lazy" draggable="true" />
            </div>
            <div class="play-grid__cell" data-cid="karuppusamy" data-weight="117">
              <img src="assets/pngs/karuppusamy-png.png" alt="Karuppusamy" width="200" height="200" loading="lazy" draggable="true" />
            </div>
            <div class="play-grid__cell" data-cid="khandoba" data-weight="112">
              <img src="assets/pngs/Khandoba.png" alt="Khandoba" width="200" height="200" loading="lazy" draggable="true" />
            </div>
            <div class="play-grid__cell" data-cid="lakshmi" data-weight="186">
              <img src="assets/pngs/Lakshmi-png.trimmed.png" alt="Lakshmi" width="200" height="200" loading="lazy" draggable="true" />
            </div>
            <div class="play-grid__cell" data-cid="mariamma" data-weight="137">
              <img src="assets/pngs/Mariamma-png.png" alt="Mariamma" width="200" height="200" loading="lazy" draggable="true" />
            </div>
            <div class="play-grid__cell" data-cid="meenakshi" data-weight="230">
              <img src="assets/pngs/Meenakshi-png.png" alt="Meenakshi" width="200" height="200" loading="lazy" draggable="true" />
            </div>
            <div class="play-grid__cell" data-cid="muni" data-weight="124">
              <img src="assets/pngs/Muni-png.png" alt="Muni" width="200" height="200" loading="lazy" draggable="true" />
            </div>
            <div class="play-grid__cell" data-cid="murugan" data-weight="139">
              <img src="assets/pngs/Murugan-png.png?v=2" alt="Murugan" width="200" height="200" loading="lazy" draggable="true" />
            </div>
            <div class="play-grid__cell" data-cid="pabuji" data-weight="128">

      var EXPLAINATION_RAW = `Krishna (Balakrishna):

The story of Krishna at Udupi—recounted in Myth=Mithya by Devdutt Pattanaik—highlights his elevated status by portraying a deity whose authority transcends rigid social hierarchies, as the idol itself turns to grant darshan to a marginalized devotee. This act not only reinforces his supreme divine agency but also positions him above institutional and caste-based restrictions, underscoring his exceptional standing among gods.
Source:
a.  Devdutt Pattanaik. Myth = Mithya: A Handbook of Hindu Mythology. New Delhi: Penguin Books India, 2006.
Vishnu

Vishnu’s elevated status within the social and religious hierarchy is not simply a reflection of inherent supremacy, but the outcome of sustained theological organization and institutional support. Brahmin scholars, through the development of Purāṇic literature and Vaishnavite traditions, shaped a cosmology in which Vishnu became the preserver and central stabilizing force. His narratives were expanded, systematized, and circulated widely, allowing his worship to become deeply embedded in temple practices and ritual life. This rise was closely tied to processes of Sanskritization, where diverse regional beliefs were absorbed into a broader, standardized framework. Local deities and traditions were often reinterpreted as forms or avatars of Vishnu, enabling a unifying but hierarchical structure. His prominence, therefore, reflects a strategic consolidation of belief systems that aligned spiritual authority with emerging social and religious institutions.


Source:
a. Gavin Flood. The Origins and Development of Classical Hinduism. Oxford: Oxford University Press, 1996.
b. Wendy Doniger. The Hindus: An Alternative History. New York: Penguin Press, 2009.


Siva

Siva’s position within the religious hierarchy emerges from a different, though parallel, process of integration and reinterpretation. Originally associated with more ambiguous, ascetic, and non-conformist traditions, Siva was gradually incorporated into Brahminical theology through the expansion of Shaivite texts and temple networks. Agamic practices and philosophical systems helped formalize his worship, transforming a figure rooted in marginal and liminal spaces into one of central cosmic significance. Rather than displacing his earlier associations, this process reframed them—absorbing folk, tribal, and regional practices into a broader Sanskritic structure. Through this theological negotiation, Siva came to embody both transcendence and authority within an ordered cosmology. His elevated status thus reflects a deliberate accommodation and restructuring of diverse traditions into a cohesive, yet stratified, religious system.

Source:
a. Gavin Flood. The Origins and Development of Classical Hinduism. Oxford: Oxford University Press, 1996.
b. Wendy Doniger. The Hindus: An Alternative History. New York: Penguin Press, 2009.



Parashurama

In the Mahabharata, Parashurama is portrayed as a divine force who repeatedly destroys arrogant Kshatriya rulers, even wiping out their class multiple times to punish abuse of power. This role as an ultimate enforcer of cosmic justice and restorer of order elevates him above ordinary gods and mortal kings in the social and moral hierarchy.

Source:
a. Vyasa, Krishna-Dwaipayana. The Mahabharata. Translated and edited by J. A. B. van Buitenen. Chicago: University of Chicago Press, 1973–1978.



Saraswati

In the Rigveda, Saraswati is positioned at the center of Brahminical ritual culture as the goddess of speech (Vāc), sacred knowledge, and priestly inspiration, directly linking her to the authority of Vedic wisdom.
As noted in Vedic scholarship such as Jan Gonda’s work on Vedic literature, her presence within the priestly corpus elevates her as a divine embodiment of learned authority rather than a peripheral folk deity.
Because she is embedded in the Brahminical framework of sacred language and ritual knowledge, her status among gods is established through association with intellectual and spiritual hierarchy, placing her above localized or non-textual deities in the religious order.

Source:

b. Gonda, Jan. Vedic Literature (Saṃhitās and Brāhmaṇas). Wiesbaden: Otto Harrassowitz, 1975.

d. “Sarasvati.” Wisdom Library. Accessed April 19, 2026. https://www.wisdomlib.org/concept/saraswati

Durga

Durga occupies a highly elevated and mass-centered social position in Hindu worship, as evidenced by the enormous congregational devotion during festivals such as Navratri, where tens of millions of devotees visit temples in a single state, reflecting her role as a dominant public deity of collective worship.
This scale of participation positions her as one of the most socially expansive deities in Hinduism, whose authority is not confined to household ritual or localized practice but expressed through large-scale, state-wide devotional movements that cut across caste and regional boundaries. As a form of Shakti, her worship consolidates both institutional temple networks and popular religiosity, reinforcing her status as a supreme protective force whose presence is activated through collective, public, and highly visible acts of devotion.

Source:

Meenakshi Amman

The history of the Meenakshi Amman Temple, as documented in temple records and scholarship, shows that access to the goddess Meenakshi was historically regulated through caste-based hierarchies, where dominant groups controlled ritual participation and temple entry. Legal disputes and reform movements in the late 19th and early 20th centuries, culminating in the 1939 temple-entry reform, reveal how her worship was embedded within—and negotiated through—structures of social authority and exclusion. This demonstrates that the goddess’s elevated status is not only religious but also socially produced through institutional control of sacred space and access..

Shrinathji

Shrinathji is associated with a strong base of patronage from merchant communities such as Oswal Jains, Agarwal Vaishyas, and Gujarati Banias, as evidenced in temple records and donation inscriptions from Nathdwara. As discussed by Richard H. Davis and John Stratton Hawley, this sustained support from economically powerful groups helped consolidate his prominence within the Pushtimarg tradition. This positions Shrinathji’s social stature as closely tied to mercantile wealth and influence, where devotional authority is reinforced through strong lay patronage rather than exclusive caste ownership.

Source:
a. Davis, Richard H. Lives of Indian Images. Princeton: Princeton University Press, 1997.
b. Hawley, John Stratton. At Play with Krishna: Pilgrimage Dramas from Brindavan. Princeton: Princeton University Press, 1981.



Venkateshwara

Venkateshwara is positioned at the center of one of the most prestigious and wealthy temple institutions in India, yet his worship remains deeply embedded in caste-based ritual hierarchies. As reports on the Tirumala Tirupati Devasthanams show, while Dalits and tribal communities are now being trained as priests, they are not permitted to serve in the main temples, reflecting the continued dominance of hereditary and Brahmanical priesthood systems.This demonstrates that Venkateshwara’s elevated status is tied not only to immense religious and economic power but also to the preservation of ritual exclusivity, where access to divine service is structured by ideas of purity, hierarchy, and caste segregation.

Lakshmi

Lakshmi holds a highly elevated and widely accessible position in Hindu worship, as she is central to Diwali and to everyday household rituals focused on prosperity, with large public gatherings reinforcing her broad social reach. This widespread devotion across domestic and public spaces establishes her as a universally revered deity whose authority transcends regional and caste boundaries. At the same time, traditions like the Lakshmi Purana present her as a figure who challenges caste hierarchy by emphasizing devotion over social status and critiquing untouchability, adding a counter-hierarchical dimension to her otherwise mainstream religious stature.

Karuppusamy

The social stature of Karuppusamy is shaped through regional and caste-based power structures, where his worship as a protector deity in southern Tamil Nadu is often embedded within dominant caste traditions such as Kallar kuladeivam practices. As noted in Frontline’s report on Dalit worship and temple access, participation in such village deities is unevenly distributed, reflecting broader hierarchies that govern religious space and belonging. At the same time, the absence of Brahmin priests and the presence of non-Brahmin or even Dalit ritual specialists show that his authority is constructed outside pan-Sanskritic systems, reinforcing a parallel but socially stratified religious order.

Pabuji 

The worship of Pabuji, as described in studies of Pabuji Ki Phad, operates outside Brahmanical ritual authority, where his divine status is mediated through Nayak Bhopa performers rather than Brahmin priests, placing him within a parallel but socially stratified religious system.
The Phad tradition shows that his divinity is publicly enacted through caste-marked performance communities, where lower-caste Bhopa narrators serve as ritual specialists, reflecting a decentralised but hierarchically structured form of sacred authority.
Because his worship is rooted in pastoral and agrarian communities rather than elite Sanskritic institutions, his religious authority reflects a socially grounded form of divinity shaped by caste position and occupational identity.
At the same time, his mythic role as a heroic protector of cattle and community order elevates him within local cosmology, but this elevation remains embedded in regional caste-based performance traditions rather than pan-Indian Brahmanical hierarchy.

Shani

Scholars such as Wendy Doniger, in The Hindus: An Alternative History, argue that Hindu mythology is inherently plural and internally contradictory, containing both hierarchical and anti-hierarchical strands that resist fixed social order. Read through this framework, Shani can be understood as a force of universal moral accountability that challenges social hierarchies by subjecting all beings equally to cosmic justice. Hence, in the interpretation of this webpage’s framing, Shani is also positioned as a figure who symbolically aligns with and offers protection to lower-caste and marginalized communities by disrupting claims of divinely sanctioned inequality.

Hanuman:

Interpretations of Hanuman’s social stature draw on readings of the Ramayana that identify the Vanaras as indigenous forest-dwelling communities, suggesting that his origins lie outside elite Vedic society and within marginalized or tribal groups. His constant posture of devotion to Rama—often depicted kneeling or at his feet—has been read as reflecting hierarchical, patron–client relationships analogous to caste structures, positioning him within a subordinate yet loyal role. At the same time, contemporary claims linking Hanuman to Dalit and Adivasi identities, including shared clan names and movements to reclaim temple worship, recast him as a figure of subaltern belonging, showing that his status among gods is actively negotiated through social and political contexts.

Muni

Based on the blog analysis in Muniswaran Worship – Part II, Muniswaran is positioned as a village guardian deity whose worship is rooted in local, non-Brahmanical traditions and is often maintained by hereditary non-Brahmin and lower-caste ritual specialists rather than temple Brahmins. The text explains that his worship operates through folk practices such as tree, stone, and ancestral forms of devotion, which are historically associated with agrarian and marginalized communities rather than elite Sanskritic institutions. This demonstrates that Muniswaran’s social stature is grounded in subaltern ritual systems, where divine authority is embedded in caste-linked village practices rather than centralized Brahmanical hierarchy.

Khandoba

The social stature of Khandoba is defined by his unique position as a unifying deity who transcends rigid caste hierarchies while still operating within them. As noted in Sahapedia, his worship at Jejuri brings together a wide spectrum of communities—from Brahmins and warrior castes to Dalits, nomadic tribes, and even non-Hindu groups—making him a rare “god of collaboration” whose authority spans social divisions.At the same time, this inclusivity reflects a layered social structure: his role as a kuladevata for multiple caste groups and his integration of diverse local traditions into a broader religious framework demonstrate that his elevated status is socially produced through syncretism and cross-caste participation rather than exclusive Brahmanical control.

Source:

Mariamman

Mariamman is not merely a localized “folk” deity but a figure whose worship actively challenges the idea of Hinduism as a single, unified, Brahmanical tradition. As Javier Gonzalez Diez argues, her cult represents a dynamic religious expression of middle and lower castes, foregrounding practices and beliefs that are often marginalized in dominant narratives. Its continued strength and expansion in urban South India further demonstrate how such traditions adapt to changing social contexts, revealing the deep connections between religious practice and caste-based social structures, and highlighting Hinduism’s internal diversity rather than a fixed hierarchy.

Source:
a. Gonzalez Diez, Javier. “The Mariyamman Cult in Puducherry, South India: An Anthropological Perspective on the Social Heterogeneity of Hinduism.” Paper presented at the University of Turin.



Murugan

Murugan is portrayed as a figure who bridges local tribal traditions and broader Vedic Hindu frameworks, symbolizing cultural synthesis rather than strict religious hierarchy, as highlighted in analyses that emphasize his role in blending diverse ritual practices.At the same time, ethnographic commentary shows that his worship remains socially stratified: Brahmin participation is limited in folk Murugan traditions, while major festivals attract different caste groups in uneven ways, with OBC and SC devotees central to certain celebrations and more dominant castes associated with others.Hence, through the interpretation of the webpage’s framing, Murugan’s devotional landscape can also be read as aligning more closely with lower-caste and subaltern participation, since his most vibrant ritual traditions are sustained by OBC and SC communities, making his social presence symbolically supportive of marginalized groups within the caste order.

Ayyanar

Ayyanar is worshipped as a rural guardian deity in Tamil Nadu, whose ritual authority is rooted in village-based, non-Brahmanical traditions where priestly roles are often performed by non-Brahmin communities such as potters (Velars), reflecting a decentralised and caste-embedded religious structure.Ethnographic accounts further show that Ayyanar worship is closely tied to caste-imposed occupational identities, where communities like the Velars continue hereditary ritual and craft roles within temple practices, reinforcing the connection between deity worship and social structure.This demonstrates that Ayyanar’s elevated role as a protector deity is socially constructed through village caste systems, where religious authority is distributed among lower and middle caste groups rather than centralized Brahmanical institutions.

      function normKey(s) {
        return String(s || "")
          .toLowerCase()
          .replace(/\(.*?\)/g, "")
          .replace(/[^a-z0-9]+/g, "")
          .trim();
      }

      function parseExplaination(raw) {
        var lines = String(raw || "").replace(/\r\n/g, "\n").split("\n");
        var out = [];
        var current = null;

        function isHeadingLine(line) {
          if (!line) return false;
          if (/^source\b/i.test(line.trim())) return false;
          if (/^a\.\s/i.test(line.trim())) return false;
          var t = line.trim();
          if (t.length > 48) return false;
          return /^[A-Za-z][A-Za-z\s()–—-]*:?$/.test(t);
        }

        function flush() {
          if (!current) return;
          var title = (current.title || "").replace(/:$/, "").trim();
          var content = current.lines.join("\n").trim();
          if (!title || !content) return;

          var parts = content.split(/\n\s*Source\s*:?\s*\n/i);
          var body = (parts[0] || "").trim();
          var sourcesRaw = (parts[1] || "").trim();
          var sources = sourcesRaw
            ? sourcesRaw
                .split("\n")
                .map(function (l) {
                  return l.trim();
                })
                .filter(Boolean)
            : [];
          out.push({ title: title, body: body, sources: sources });
        }

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          var t = line.trim();
          if (!t) {
            if (current) current.lines.push("");
            continue;
          }
          if (isHeadingLine(t)) {
            // Heuristic: treat as heading if next non-empty line isn't "Source"
            var j = i + 1;
            while (j < lines.length && !lines[j].trim()) j++;
            var next = j < lines.length ? lines[j].trim() : "";
            if (next && !/^source\b/i.test(next)) {
              flush();
              current = { title: t, lines: [] };
              continue;
            }
          }
          if (!current) {
            // Allow for leading sections without a clean heading (e.g. Poleramma in this file).
            current = { title: "Poleramma", lines: [] };
          }
          current.lines.push(line);
        }
        flush();
        return out;
      }

      function buildExplainationMap(raw) {
        var sections = parseExplaination(raw);
        var map = {};

        var titleToCid = {
          krishna: "balakrishna",
          balakrishna: "balakrishna",
          vishnu: "vishnu",
          siva: "shiva",
          shiva: "shiva",
          parashurama: "parashurama",
          saraswati: "saraswati",
          durga: "durga",
          meenakshiamman: "meenakshi",
          meenakshi: "meenakshi",
          shrinathji: "shrinathji",
          venkateswar: "venkateshwara",
          venkateshwara: "venkateshwara",
          lakshmi: "lakshmi",
          karuppaswamy: "karuppusamy",
          karuppasamy: "karuppusamy",
          pabuji: "pabuji",
          shani: "shani",
          hanuman: "hanuman",
          muni: "muni",
          khandoba: "khandoba",
          mariamman: "mariamma",
          mariamma: "mariamma",
          murugan: "murugan",
          ayyanar: "ayyanar",
          poleramma: "poleramma"
        };

        sections.forEach(function (s) {
          var k = normKey(s.title);
          var cid = titleToCid[k] || k;
          map[cid] = s;
        });
        return map;
      }

      var EXPLAIN = buildExplainationMap(EXPLAINATION_RAW);
      var seenInfo = new Set();

      // Prefer live `Explaination.txt` so edits update without touching this HTML.
      // Falls back to embedded `EXPLAINATION_RAW` if fetch is unavailable.
      try {
        fetch("./assets/text/Explaination.txt", { cache: "no-store" })
          .then(function (r) {
            if (!r.ok) throw new Error("Explaination.txt fetch failed");
            return r.text();
          })
          .then(function (txt) {
            EXPLAIN = buildExplainationMap(txt);
          })
          .catch(function () {});
      } catch (e) {}

      function linkify(text) {
        // Keep it simple: show URLs as clickable if present.
        var parts = String(text || "").split(/(https?:\/\/[^\s)]+)\b/g);
        var frag = document.createDocumentFragment();
        parts.forEach(function (p) {
          if (/^https?:\/\//.test(p)) {
            var a = document.createElement("a");
            a.href = p;
            a.textContent = p;
            a.target = "_blank";
            a.rel = "noreferrer noopener";
            frag.appendChild(a);
          } else {
            frag.appendChild(document.createTextNode(p));
          }
        });
        return frag;
      }

      var arrows = document.getElementById("info-arrows");
      var arrowsTimer = null;
      var arrowsRaf = null;

      function positionArrows() {
        if (!arrows) return;
        if (!infoFeed) return;
        var rect = infoFeed.getBoundingClientRect();
        // Place just above the explanation console (feed), centered on page.
        var y = rect.top + window.scrollY - 64;
        arrows.style.top = Math.max(8, y) + "px";
      }

      function schedulePositionArrows() {
        if (arrowsRaf) return;
        arrowsRaf = window.requestAnimationFrame(function () {
          arrowsRaf = null;
          positionArrows();
        });
      }

      function pulseArrows() {
        if (!arrows) return;
        arrows.classList.add("is-active");
        if (arrowsTimer) window.clearTimeout(arrowsTimer);
        arrowsTimer = window.setTimeout(function () {
          arrows.classList.remove("is-active");
        }, 2200);
      }

      function ensureInfoNode(cid, opts) {
        if (!infoFeed || !cid) return;
        opts = opts || {};
        var shouldScroll = opts.shouldScroll !== false;

        var existing = infoFeed.querySelector('.info-node[data-cid="' + cid + '"]');
        if (existing) {
          existing.classList.remove("is-existing");
          void existing.offsetWidth; // restart animation
          existing.classList.add("is-existing");
          if (shouldScroll) existing.scrollIntoView({ behavior: "smooth", block: "nearest" });
          return;
        }

        var cellImg = document.querySelector('.play-grid__cell[data-cid="' + cid + '"] img');
        var name = (cellImg && cellImg.getAttribute("alt")) || cid;

        var data = EXPLAIN[cid];
        var body = data && data.body ? data.body : (BIOS[cid] || "");
        var sources = data && data.sources ? data.sources : [];

        var node = document.createElement("article");
        node.className = "info-node";
        node.setAttribute("data-cid", cid);

        var head = document.createElement("div");
        head.className = "info-node__head";

        var h = document.createElement("h3");
        h.className = "info-node__name";
        h.textContent = name;

        head.appendChild(h);

        var p = document.createElement("p");
        p.className = "info-node__body";
        p.textContent = body;

        node.appendChild(head);
        node.appendChild(p);

        if (sources && sources.length) {
          var sWrap = document.createElement("div");
          sWrap.className = "info-node__sources";

          var st = document.createElement("p");
          st.className = "info-node__sources-title";
          st.textContent = "Sources";

          var ul = document.createElement("ul");
          sources.forEach(function (s) {
            var li = document.createElement("li");
            li.appendChild(linkify(s));
            ul.appendChild(li);
          });

          sWrap.appendChild(st);
          sWrap.appendChild(ul);
          node.appendChild(sWrap);
        }

        // Newest-first: add to top of timeline.
        infoFeed.insertBefore(node, infoFeed.firstChild);
        pulseArrows();
        schedulePositionArrows();
        if (shouldScroll) node.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }

      function onDeityInteract(cid, opts) {
        if (!cid) return;
        if (seenInfo.has(cid)) {
          ensureInfoNode(cid, opts);
          return;
        }
        seenInfo.add(cid);
        ensureInfoNode(cid, opts);
      }

      function placeOnPan(cid, side) {
        if (!cid || !leftContent || !rightContent) return;
        var cell = document.querySelector('.play-grid__cell[data-cid="' + cid + '"]');
        if (!cell) return;
        var img = cell.querySelector("img");
        if (!img) return;
        var src = img.getAttribute("src") || "";
        var name = img.getAttribute("alt") || "Figure";
        var chip = buildChip(src, name);
        if (side === "left") {
          leftCid = cid;
          leftContent.innerHTML = "";
          leftContent.appendChild(chip);
        } else {
          rightCid = cid;
          rightContent.innerHTML = "";
          rightContent.appendChild(chip);
        }
        updateBeam();
        updateComparePanels();
        // Dropping should add info but NOT auto-scroll the page.
        onDeityInteract(cid, { shouldScroll: false });
        // Drag/drop placement should play the DragDrop SFX (not mouse click).
        try {
          var dragSfx = document.getElementById("drag-audio");
          if (dragSfx) {
            try {
              dragSfx.currentTime = 0;
            } catch (e) {}
            var p = dragSfx.play();
            if (p && typeof p.catch === "function") p.catch(function () {});
          }
        } catch (e) {}
      }

      function getDragId(d) {
        if (!d) return "";
        var id = d.getData("text/plain");
        if (id) return id;
        try {
          id = d.getData("Text");
        } catch (e) {}
        return id || "";
      }

      function bindPanDrop(pan, side) {
        if (!pan) return;
        pan.addEventListener("dragover", function (e) {
          e.preventDefault();
          pan.classList.add("is-dragover");
          e.dataTransfer.dropEffect = "move";
        });
        pan.addEventListener("dragleave", function (e) {
          if (pan.contains(e.relatedTarget)) return;
          pan.classList.remove("is-dragover");
        });
        pan.addEventListener("drop", function (e) {
          e.preventDefault();
          pan.classList.remove("is-dragover");
          var id = getDragId(e.dataTransfer);
          if (id) placeOnPan(id, side);
        });
      }

      document.querySelectorAll(".play-grid__cell[data-cid] img").forEach(function (img) {
        img.style.cursor = "pointer";
        img.addEventListener("click", function () {
          var cell = img.closest(".play-grid__cell");
          if (!cell) return;
          var id = cell.getAttribute("data-cid");
          if (id) onDeityInteract(id, { shouldScroll: true });
        });
        img.addEventListener("dragstart", function (e) {
          var cell = img.closest(".play-grid__cell");
          if (!cell) return;
          var id = cell.getAttribute("data-cid");
          if (!id) return;
          if (e.dataTransfer) {
            e.dataTransfer.setData("text/plain", id);
            try {
              e.dataTransfer.setData("Text", id);
            } catch (err) {}
            e.dataTransfer.effectAllowed = "move";
          }
        });
        img.addEventListener("dragend", function () {
          if (leftPan) leftPan.classList.remove("is-dragover");
          if (rightPan) rightPan.classList.remove("is-dragover");
        });
      });

      bindPanDrop(leftPan, "left");
      bindPanDrop(rightPan, "right");

      positionArrows();
      window.addEventListener("scroll", schedulePositionArrows, { passive: true });
      window.addEventListener("resize", schedulePositionArrows);

      updateBeam();
      updateComparePanels();
    })();
  </script>
